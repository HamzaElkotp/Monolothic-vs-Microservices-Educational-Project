version: '3.8'

services:
  user-db:
    image: postgres:15-alpine
    container_name: user-microservice-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata_user:/var/lib/postgresql/data

volumes:
  pgdata_user:
