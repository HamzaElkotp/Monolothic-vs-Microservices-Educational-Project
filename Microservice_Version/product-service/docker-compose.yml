version: '3.8'

services:
  product-db:
    image: postgres:15-alpine
    container_name: product-microservice-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product_db
    ports:
      - "5435:5432"
    volumes:
      - pgdata_product:/var/lib/postgresql/data

volumes:
  pgdata_product:
