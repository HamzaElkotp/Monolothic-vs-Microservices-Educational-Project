version: '3.8'

services:
  cart-db:
    image: postgres:15-alpine
    container_name: cart-microservice-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cart_db
    ports:
      - "5436:5432"
    volumes:
      - pgdata_cart:/var/lib/postgresql/data

volumes:
  pgdata_cart:
